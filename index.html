<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sama & amir</title>
    <style>
        :root {
            --neon-red: #ff1f4b;
            --neon-red-soft: rgba(255, 31, 75, 0.55);
            --neon-red-glow: rgba(255, 31, 75, 0.7);
            --neon-pink: #ff4fd8;
            --glass-bg: rgba(20, 20, 26, 0.45);
            --glass-border: rgba(255, 255, 255, 0.10);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%; height: 100%; overflow: hidden; background-color: #000;
        }

        /* ===== Intro ===== */
        .intro-screen {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, #151515 0%, #000 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 50;
            transition: opacity 0.8s ease-out, visibility 0.8s;
            cursor: pointer;
        }
        .intro-screen.hide { opacity: 0; visibility: hidden; }

        .arrow-btn {
            width: 70px; height: 70px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(255,255,255,0.03);
            margin-bottom: 25px;
            animation: bounce 1.8s infinite ease-in-out;
            transition: background .3s, border-color .3s, box-shadow .3s;
        }
        .intro-screen:hover .arrow-btn {
            background: var(--neon-red-soft);
            border-color: var(--neon-red);
            box-shadow: 0 0 22px var(--neon-red-soft);
        }
        .arrow-btn::after {
            content: ''; width: 16px; height: 16px;
            border-top: 3px solid #fff; border-left: 3px solid #fff;
            transform: rotate(45deg); margin-top: 6px;
        }
        .enter-text {
            color: #fff; font-size: 14px; letter-spacing: 5px;
            font-weight: 600; text-transform: uppercase; opacity: .8;
        }
        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* ===== Main ===== */
        .main-container {
            position: relative; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 20px; gap: 22px;
        }

        .bg-video {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
            filter: brightness(0.4) blur(4px);
            transition: filter .6s;
        }
        .main-container.love .bg-video {
            filter: brightness(0.22) blur(5px) sepia(0.3) hue-rotate(-30deg);
        }

        .glass-layer {
            position: absolute; inset: 0; z-index: 1;
            backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
            pointer-events: none;
        }

        .love-btn {
            position: relative; z-index: 5;
            padding: 12px 34px; border-radius: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(18px) saturate(160%);
            -webkit-backdrop-filter: blur(18px) saturate(160%);
            border: 1px solid var(--glass-border);
            color: #fff; font-size: 16px; letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(255,31,75,0.18), inset 0 0 12px rgba(255,255,255,0.05);
            transition: transform .25s, box-shadow .25s, border-color .25s;
        }
        .love-btn:hover {
            transform: translateY(-2px);
            border-color: var(--neon-red);
            box-shadow: 0 10px 36px var(--neon-red-soft), inset 0 0 16px rgba(255,31,75,0.12);
        }
        .love-btn.active {
            border-color: var(--neon-red);
            box-shadow: 0 0 25px var(--neon-red-soft), 0 0 40px var(--neon-red-glow);
            color: var(--neon-red);
            text-shadow: 0 0 12px var(--neon-red-glow);
        }

        /* ===== Cards row ===== */
        .cards-row {
            position: relative; z-index: 3;
            display: flex; gap: 26px;
            flex-wrap: wrap; justify-content: center;
            perspective: 1400px;
            width: 100%;
            max-width: 100vw;
            box-sizing: border-box;
        }

        /* 3D flip wrapper */
        .card-flip {
            width: 320px; height: 460px;
            transform-style: preserve-3d;
            transform: rotateY(0deg);
            transition: transform .9s cubic-bezier(.175,.885,.32,1.275);
            opacity: 0;
        }
        .main-container.active .card-flip {
            opacity: 1;
        }
        .main-container.love .card-flip {
            transform: rotateY(180deg);
        }

        /* common face styles */
        .card-face {
            position: absolute; inset: 0;
            border-radius: 28px;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            background: var(--glass-bg);
            backdrop-filter: blur(15px) saturate(150%);
            -webkit-backdrop-filter: blur(15px) saturate(150%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.55), inset 0 0 20px rgba(255,255,255,0.04);
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
            transition: border-color .4s, box-shadow .4s;
        }
        .card-face::before {
            content: ''; position: absolute; inset: 0; border-radius: 28px;
            background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0));
            pointer-events: none;
        }
        .card-face:hover {
            border-color: var(--neon-red);
            box-shadow: 0 24px 60px var(--neon-red-soft), inset 0 0 22px rgba(255,31,75,0.10);
        }

        /* Front */
        .card-front {
            transform: rotateY(0deg);
            padding: 26px 22px;
        }

        /* Back */
        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(160deg, rgba(40,0,30,0.65), rgba(20,0,15,0.75));
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,79,216,0.35);
            justify-content: center; align-items: center;
            text-align: center; padding: 24px;
            box-shadow: inset 0 0 30px rgba(255,79,216,0.25),
                        0 20px 50px rgba(0,0,0,0.55);
        }
        .card-back .neon-pink {
            color: var(--neon-pink); font-size: 22px; font-weight: bold;
            text-shadow: 0 0 8px var(--neon-pink), 0 0 18px rgba(255,79,216,0.8);
            line-height: 1.6;
            animation: pinkPulse 2.4s infinite ease-in-out;
        }
        .card-back .neon-sub {
            color: rgba(255,79,216,0.5); font-size: 12px; margin-top: 10px;
            letter-spacing: 3px;
        }
        @keyframes pinkPulse {
            0%,100% { text-shadow: 0 0 8px var(--neon-pink), 0 0 18px rgba(255,79,216,0.6); }
            50%     { text-shadow: 0 0 14px var(--neon-pink), 0 0 30px rgba(255,79,216,1); }
        }

        /* Card inner elements */
        .avatar-wrapper {
            width: 110px; height: 110px; margin: 0 auto 18px;
            border-radius: 50%; padding: 3px;
            background: linear-gradient(45deg, var(--neon-red), rgba(255,255,255,0.25));
            box-shadow: 0 0 18px var(--neon-red-soft);
        }
        .avatar {
            width: 100%; height: 100%; border-radius: 50%;
            object-fit: cover; background: #333;
        }
        .profile-name {
            color: #fff; font-size: 24px; font-weight: bold;
            margin-bottom: 8px; letter-spacing: 1px;
        }
        .location {
            display: flex; align-items: center; gap: 6px;
            color: #a0a0a5; font-size: 14px; margin-bottom: 22px;
        }
        .location svg { width: 15px; height: 15px; fill: #a0a0a5; }
        .social-buttons { display: flex; gap: 14px; margin-bottom: 22px; }
        .social-btn {
            width: 48px; height: 48px; border-radius: 50%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: center; align-items: center;
            transition: transform .3s, background .3s, border-color .3s, box-shadow .3s;
        }
        .social-btn:hover {
            transform: translateY(-3px);
            border-color: var(--neon-red);
            box-shadow: 0 0 16px var(--neon-red-soft);
        }
        .social-btn svg { width: 22px; height: 22px; }
        .views-count {
            display: flex; align-items: center; gap: 8px;
            color: #707075; font-size: 13px;
        }
        .views-count svg { width: 16px; height: 16px; fill: #707075; }

        /* extra texts on card */
        .card-text-tl {
            position: absolute; top: 16px; left: 16px;
            color: rgba(255,255,255,0.4); font-size: 10px;
            letter-spacing: 2px; writing-mode: vertical-rl;
        }
        .card-text-bl {
            position: absolute; bottom: 16px; left: 16px;
            color: rgba(255,255,255,0.3); font-size: 10px;
            letter-spacing: 2px; writing-mode: vertical-rl;
            transform: rotate(180deg);
        }
        .card-extra-img {
            position: absolute; top: 14px; right: 14px;
            width: 38px; height: 38px; border-radius: 10px;
            object-fit: cover; border: 1px solid rgba(255,255,255,0.12);
        }

        /* ===== Hearts canvas ===== */
        .hearts-canvas {
            position: absolute; inset: 0; z-index: 2;
            pointer-events: none; opacity: 0; transition: opacity .8s;
        }
        .main-container.love .hearts-canvas { opacity: 1; }

        /* ===== Audio control ===== */
        .audio-player {
            position: absolute; bottom: 30px; right: 30px; z-index: 6;
            background: var(--glass-bg);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 10px 15px; border-radius: 50px;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .mute-btn {
            background: none; border: none; color: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .mute-btn svg { width: 18px; height: 18px; fill: #fff; }
        .volume-slider {
            -webkit-appearance: none; appearance: none;
            width: 70px; height: 4px;
            background: rgba(255,255,255,0.2); border-radius: 2px; outline: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 14px; height: 14px; border-radius: 50%;
            background: var(--neon-red); cursor: pointer;
            box-shadow: 0 0 8px var(--neon-red-soft);
        }

        .watermark {
            position: absolute; bottom: 15px; left: 50%;
            transform: translateX(-50%); z-index: 3;
            color: rgba(255,255,255,0.2); font-size: 9px;
            letter-spacing: 1px; text-transform: uppercase;
            pointer-events: none; text-align: center; line-height: 1.4;
        }

        @media (max-width: 600px) {
            .cards-row {
                display: flex !important;
                flex-direction: row !important;
                flex-wrap: nowrap !important;
                justify-content: space-evenly;
                align-items: stretch;
                gap: 4px !important;
                width: 100% !important;
                padding: 0 2px;
                perspective: none;
            }
            .card-flip {
                flex: 0 0 calc(50% - 4px) !important;
                width: calc(50% - 4px) !important;
                height: 340px !important;
            }
            .card-front { padding: 10px 6px; }
            .card-back { padding: 10px 6px; }
            .avatar-wrapper { width: 42px; height: 42px; margin-bottom: 4px; padding: 2px; }
            .profile-name { font-size: 12px; margin-bottom: 2px; }
            .location { font-size: 8px; margin-bottom: 6px; gap: 2px; }
            .location svg { width: 9px; height: 9px; }
            .social-buttons { gap: 4px; margin-bottom: 6px; }
            .social-btn { width: 26px; height: 26px; }
            .social-btn svg { width: 13px; height: 13px; }
            .views-count { font-size: 8px; gap: 2px; }
            .views-count svg { width: 9px; height: 9px; }
            .card-text-tl, .card-text-bl { font-size: 6px; top: 6px; left: 6px; bottom: 6px; }
            .card-extra-img { width: 18px; height: 18px; top: 6px; right: 6px; border-radius: 4px; }
            .love-btn {
                padding: 8px 16px; font-size: 11px; letter-spacing: 1px;
                border-width: 2px; position: relative; z-index: 10;
            }
            .main-container {
                gap: 8px; padding: 8px; padding-top: 12px;
                justify-content: flex-start;
            }
            .neon-pink { font-size: 11px; }
            .neon-sub { font-size: 7px; letter-spacing: 1px; }
            .watermark { font-size: 6px; bottom: 4px; }
            .audio-player { bottom: 8px; right: 8px; padding: 4px 8px; }
            .volume-slider { width: 36px; }
            .mute-btn svg { width: 12px; height: 12px; }
        }
    </style>
</head>

    <script>
        const introScreen   = document.getElementById('introScreen');
        const mainContainer = document.getElementById('mainContainer');
        const bgVideo       = document.getElementById('bgVideo');
        const soundOnIcon   = document.getElementById('soundOnIcon');
        const soundOffIcon  = document.getElementById('soundOffIcon');
        const loveBtn       = document.getElementById('loveBtn');
        const heartsCanvas  = document.getElementById('heartsCanvas');
        const hctx          = heartsCanvas.getContext('2d');

        let hearts = [];
        let heartsRAF = null;

        function resizeCanvas(){
            heartsCanvas.width  = window.innerWidth;
            heartsCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function drawHeart(x, y, s, alpha){
            hctx.save();
            hctx.translate(x, y);
            hctx.scale(s, s);
            hctx.globalAlpha = alpha;
            hctx.fillStyle = '#ff4fd8';
            hctx.shadowColor = '#ff4fd8';
            hctx.shadowBlur = 12;
            hctx.beginPath();
            hctx.moveTo(0, 3);
            hctx.bezierCurveTo(0, 1, -2, -2, -4, -2);
            hctx.bezierCurveTo(-8, -2, -8, 3, -8, 3);
            hctx.bezierCurveTo(-8, 6, -4, 9, 0, 12);
            hctx.bezierCurveTo(4, 9, 8, 6, 8, 3);
            hctx.bezierCurveTo(8, 3, 8, -2, 4, -2);
            hctx.bezierCurveTo(2, -2, 0, 1, 0, 3);
            hctx.closePath();
            hctx.fill();
            hctx.restore();
        }

        function spawnHeart(){
            hearts.push({
                x: Math.random() * heartsCanvas.width,
                y: heartsCanvas.height + 20,
                s: 0.6 + Math.random() * 1.2,
                vy: 0.6 + Math.random() * 1.4,
                vx: (Math.random() - 0.5) * 0.8,
                a: 0.5 + Math.random() * 0.5,
                sway: Math.random() * Math.PI * 2
            });
        }

        function animateHearts(){
            hctx.clearRect(0, 0, heartsCanvas.width, heartsCanvas.height);
            if (Math.random() < 0.35) spawnHeart();
            for (let i = hearts.length - 1; i >= 0; i--){
                const h = hearts[i];
                h.y -= h.vy;
                h.sway += 0.05;
                h.x += Math.sin(h.sway) * 0.6 + h.vx;
                drawHeart(h.x, h.y, h.s, h.a);
                if (h.y < -30) hearts.splice(i, 1);
            }
            heartsRAF = requestAnimationFrame(animateHearts);
        }

        function enterSite() {
            introScreen.classList.add('hide');
            mainContainer.classList.add('active');
            bgVideo.muted = false;
            bgVideo.volume = 0.5;
            bgVideo.play().catch(e => console.log("playback:", e));
        }

        function toggleLove() {
            const on = mainContainer.classList.toggle('love');
            loveBtn.classList.toggle('active', on);
            if (on) {
                if (!heartsRAF) animateHearts();
            } else {
                cancelAnimationFrame(heartsRAF);
                heartsRAF = null;
                hctx.clearRect(0, 0, heartsCanvas.width, heartsCanvas.height);
                hearts = [];
            }
        }

        function toggleMute() {
            if (bgVideo.muted) {
                bgVideo.muted = false;
                soundOnIcon.style.display = 'block';
                soundOffIcon.style.display = 'none';
            } else {
                bgVideo.muted = true;
                soundOnIcon.style.display = 'none';
                soundOffIcon.style.display = 'block';
            }
        }

        function changeVolume(v){
            bgVideo.volume = v;
            if (v == 0) {
                bgVideo.muted = true;
                soundOnIcon.style.display = 'none';
                soundOffIcon.style.display = 'block';
            } else {
                bgVideo.muted = false;
                soundOnIcon.style.display = 'block';
                soundOffIcon.style.display = 'none';
            }
        }
    </script>
</body>
</html>
