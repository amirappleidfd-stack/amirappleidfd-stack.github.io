۴<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMIRAli</title>
    <style>
        /* تنظیمات پایه */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* صفحه ورود اول (Intro Page) */
        .intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #151515 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.8s ease-out, visibility 0.8s;
            cursor: pointer;
        }

        .intro-screen.hide {
            opacity: 0;
            visibility: hidden;
        }

        /* دکمه فلش نوسانی */
        .arrow-btn {
            width: 70px;
            height: 70px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 25px;
            animation: bounce 1.8s infinite ease-in-out;
            transition: background 0.3s, border-color 0.3s;
        }

        .intro-screen:hover .arrow-btn {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* ساخت فلش با CSS */
        .arrow-btn::after {
            content: '';
            width: 16px;
            height: 16px;
            border-top: 3px solid #ffffff;
            border-left: 3px solid #ffffff;
            transform: rotate(45deg);
            margin-top: 6px;
        }

        /* متن دکمه ورود */
        .enter-text {
            color: #ffffff;
            font-size: 14px;
            letter-spacing: 5px;
            font-weight: 600;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* انیمیشن نوسان بالا و پایین دکمه ورود */
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        /* صفحه اصلی بعد از ورود */
        .main-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ویدیو پس‌زمینه همراه با صدا */
        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            filter: brightness(0.4) blur(4px);
        }

        /* کارت مشخصات شیشه‌ای */
        .profile-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 360px;
            background: rgba(25, 25, 27, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .main-container.active .profile-card {
            opacity: 1;
            transform: scale(1);
        }

        /* دکمه اشتراک‌گذاری بالا سمت چپ کارت */
        .share-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.3s;
        }

        .share-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .share-btn svg {
            width: 16px;
            height: 16px;
            fill: #fff;
        }

        /* عکس پروفایل دایره‌ای */
        .avatar-wrapper {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(45deg, rgba(255,255,255,0.1), rgba(255,255,255,0.3));
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background-color: #333;
        }

        /* نام پروفایل */
        .profile-name {
            color: #ffffff;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        /* موقعیت مکانی */
        .location {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #a0a0a5;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .location svg {
            width: 16px;
            height: 16px;
            fill: #a0a0a5;
        }

        /* دکمه‌های شبکه‌های اجتماعی */
        .social-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            text-decoration: none;
            transition: transform 0.3s, background 0.3s, border-color 0.3s;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .social-btn svg {
            width: 22px;
            height: 22px;
        }
        
        /* استایل خاص برای لوگوی روبیکا */
        .rubika-btn svg {
            width: 26px;
            height: 26px;
        }

        /* تعداد بازدید */
        .views-count {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #707075;
            font-size: 13px;
        }

        .views-count svg {
            width: 16px;
            height: 16px;
            fill: #707075;
        }

        /* کنترلر صدا */
        .audio-player {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 3;
            background: rgba(25, 25, 27, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px 15px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .mute-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mute-btn svg {
            width: 18px;
            height: 18px;
            fill: #fff;
        }

        /* اسلایدر میزان صدا */
        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 70px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
            transition: background 0.3s;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
        }

        /* متن پایین صفحه */
        .watermark {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            color: rgba(255,255,255,0.2);
            font-size: 9px;
            letter-spacing: 1px;
            text-transform: uppercase;
            pointer-events: none;
            text-align: center;
            line-height: 1.4;
        }

        @media (max-width: 400px) {
            .profile-card {
                padding: 25px 20px;
            }
            .audio-player {
                bottom: 20px;
                right: 20px;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>

    <!-- ۱. صفحه ورودی با فلش متحرک نوسانی -->
    <div class="intro-screen" id="introScreen" onclick="enterSite()">
        <div class="arrow-btn"></div>
        <div class="enter-text">CLICK TO ENTER</div>
    </div>

    <!-- ۲. صفحه اصلی محتوا -->
    <div class="main-container" id="mainContainer">
        
        <!-- ویدیو پس‌زمینه -->
        <video class="bg-video" id="bgVideo" loop playsinline muted>
            <source src="video.mp4" type="video/mp4">
        </video>

        <!-- کارت بیوگرافی اصلی -->
        <div class="profile-card">
            <!-- دکمه اشتراک‌گذاری -->
            <div class="share-btn" onclick="shareProfile()">
                <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>
            </div>

            <!-- عکس پروفایل -->
            <div class="avatar-wrapper">
                <img src="amir.jpg" alt="" class="avatar">
            </div>

            <!-- نام پروفایل جدید -->
            <div class="profile-name">𝓐𝓶𝓲𝓻</div>

            <!-- مکان -->
            <div class="location">
                <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                <span>Tabriz</span>
            </div>

            <!-- دکمه‌های شبکه‌های اجتماعی -->
            <div class="social-buttons">
                <!-- تلگرام -->
                <a href="https://t.me:/DeBuG_aza4" target="_blank" class="social-btn">
                    <svg viewBox="0 0 24 24"><path fill="#fff" d="M9.78 18.65l.28-4.28 7.68-6.92c.34-.31-.07-.48-.52-.19L7.74 13.3 3.64 12c-.89-.28-.89-.89.19-1.31l16.03-6.17c.74-.27 1.39.18 1.15 1.15l-2.72 12.81c-.19.94-.76 1.17-1.55.73l-4.13-3.04-2 1.93c-.23.23-.41.41-.83.41z"/></svg>
                </a>
                
                <!-- روبیکا -->
                <a href="https://www.instagram.com/bachefazai?igsh=MWZpcG90NnM5bWxscw%3D%3D&utm_source=qr" target="_blank" class="social-btn rubika-btn">
                    <svg viewBox="0 0 100 100">
                        <polygon points="50,15 24,30 37,52 50,30" fill="#F8981D"/>
                        <polygon points="50,15 50,30 63,52 76,30" fill="#8DC63F"/>
                        <polygon points="76,30 63,52 89,52" fill="#00B5AD"/>
                        <polygon points="89,52 76,74 63,52" fill="#4A277A"/>
                        <polygon points="76,74 50,89 50,74 63,52" fill="#8E2A8C"/>
                        <polygon points="50,89 24,74 37,52 50,74" fill="#EE3124"/>
                        <polygon points="24,74 37,52 11,52" fill="#F7941D"/>
                        <polygon points="11,52 24,30 37,52" fill="#00AEEF"/>
                        <polygon points="24,30 37,52 50,30" fill="#1B1464"/>
                        <polygon points="50,30 63,52 50,74 37,52" fill="#F1F2F2"/>
                        <polygon points="50,30 63,52 50,52" fill="#E6E7E8"/>
                        <polygon points="37,52 50,52 50,74" fill="#D1D3D4"/>
                    </svg>
                </a>
            </div>

            <!-- تعداد بازدید -->
            <div class="views-count">
                <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                <span id="viewCountNumber">8304</span>
            </div>
        </div>

        <!-- کنترلر صدا -->
        <div class="audio-player">
            <button class="mute-btn" id="muteBtn" onclick="toggleMute()">
                <svg id="soundOnIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                <svg id="soundOffIcon" viewBox="0 0 24 24" style="display:none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
            </button>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.1" value="0.5" oninput="changeVolume(this.value)">
        </div>

        <!-- متن پایین صفحه -->
        <div class="watermark">
            T.ME / amir3ui<br>insta / bachefazai
        </div>
    </div>

    <script>
        const introScreen = document.getElementById('introScreen');
        const mainContainer = document.getElementById('mainContainer');
        const bgVideo = document.getElementById('bgVideo');
        const muteBtn = document.getElementById('muteBtn');
        const soundOnIcon = document.getElementById('soundOnIcon');
        const soundOffIcon = document.getElementById('soundOffIcon');

        function enterSite() {
            introScreen.classList.add('hide');
            mainContainer.classList.add('active');
            
            bgVideo.muted = false;
            bgVideo.volume = 0.5;
            bgVideo.play().catch(err => console.log("Video playback active:", err));
            
            const viewSpan = document.getElementById('viewCountNumber');
            let currentViews = parseInt(viewSpan.innerText);
            viewSpan.innerText = currentViews + 1;
        }

        function toggleMute() {
            if (bgVideo.muted) {
                bgVideo.muted = false;
                soundOnIcon.style.display = 'block';
                soundOffIcon.style.display = 'none';
            } else {
                bgVideo.muted = true;
                soundOnIcon.style.display = 'none';
                soundOffIcon.style.display = 'block';
            }
        }

        function changeVolume(volume) {
            bgVideo.volume = volume;
            if(volume == 0) {
                bgVideo.muted = true;
                soundOnIcon.style.display = 'none';
                soundOffIcon.style.display = 'block';
            } else {
                bgVideo.muted = false;
                soundOnIcon.style.display = 'block';
                soundOffIcon.style.display = 'none';
            }
        }

        function shareProfile() {
            if (navigator.share) {
                navigator.share({
                    title: 'DeBuG Profile',
                    url: window.location.href
                }).catch(console.error);
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('لینک صفحه کپی شد!');
            }
        }
    </script>
</body>
</html>
